name: Build NAC API (patched)

# Builds the custom bluecords/{api,events,crond,pushd} images from this fork
# and publishes them under the REAL release-please version number - not a
# nickname tag. The root Dockerfile compiles the Rust workspace (where NAC
# patches live); crates/delta/Dockerfile, crates/bonfire/Dockerfile,
# crates/daemons/crond/Dockerfile, and crates/daemons/pushd/Dockerfile each
# bundle one resulting binary into distroless and we push them to
# ghcr.io/bluecords/{api,events,crond,pushd}.
#
# Runs on a standard GitHub runner (the upstream workflow needs a self-hosted
# arc-runner-set the fork doesn't have). Single-arch amd64 (matches the Linode).
#
# 2026-06-29 - rewired as part of moving to a real release process: this
# previously triggered on every push to main and pushed a fixed nickname tag
# (voice-ttl-fix). That meant rebuilding the same tag silently, with nothing
# in prod's config ever changing to reflect it - the deploy script had no
# signal that anything new existed, so updates got silently skipped unless
# someone noticed and force-pulled manually. Now it only builds when
# release-please actually cuts a real release (a deliberate, visible version
# bump you approve), and tags images with that exact version - so updating
# nac-server's compose.yml to the new version is what triggers the deploy,
# every time, with no silent skips possible.
#
# 2026-07-12 - extended to also build crond + pushd (nac-server#19): both
# previously ran upstream ghcr.io/stoatchat/* images, so the AMQP
# consumer-reconnect fix landing in crond/pushd source didn't ship until we
# owned the build for them too. Same base image, same distroless pattern as
# api/events - just two more Dockerfiles.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build and push (for a manual/emergency build outside the normal release flow)'
        required: true
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Add swap space (Rust link steps are memory-heavy)
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Checkout the exact release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Sync Cargo.lock to the release version bump
        # release-please bumps every crate's version in Cargo.toml, but the
        # matching Cargo.lock update can be missing from the merged release
        # commit: release-please's own lock-sync step runs in a separate job that
        # `concurrency: cancel-in-progress` cancels when the release PR is merged
        # moments after the fix PR (exactly what broke the v0.17.2 image build -
        # `cargo build --locked` below then fails on the stale lock). `cargo
        # update --workspace` re-pins ONLY the workspace member versions, never
        # external deps (verified: it reports the 200+ deps as unchanged), so the
        # in-Docker `--locked` build can no longer fail on this race. No-op when
        # the lock is already correct.
        run: cargo update --workspace

      - name: Build base image (compiles Rust workspace incl. NAC patches)
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg TARGETARCH=amd64 \
            -t ghcr.io/stoatchat/base:latest \
            -f Dockerfile .

      - name: Build & push API image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t ghcr.io/bluecords/api:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/bluecords/api:latest \
            -f crates/delta/Dockerfile .
          docker push ghcr.io/bluecords/api:${{ steps.tag.outputs.tag }}
          docker push ghcr.io/bluecords/api:latest
          echo "Pushed ghcr.io/bluecords/api:${{ steps.tag.outputs.tag }} (+ :latest)"

      - name: Build & push events image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t ghcr.io/bluecords/events:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/bluecords/events:latest \
            -f crates/bonfire/Dockerfile .
          docker push ghcr.io/bluecords/events:${{ steps.tag.outputs.tag }}
          docker push ghcr.io/bluecords/events:latest
          echo "Pushed ghcr.io/bluecords/events:${{ steps.tag.outputs.tag }} (+ :latest)"

      - name: Build & push crond image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t ghcr.io/bluecords/crond:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/bluecords/crond:latest \
            -f crates/daemons/crond/Dockerfile .
          docker push ghcr.io/bluecords/crond:${{ steps.tag.outputs.tag }}
          docker push ghcr.io/bluecords/crond:latest
          echo "Pushed ghcr.io/bluecords/crond:${{ steps.tag.outputs.tag }} (+ :latest)"

      - name: Build & push pushd image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            -t ghcr.io/bluecords/pushd:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/bluecords/pushd:latest \
            -f crates/daemons/pushd/Dockerfile .
          docker push ghcr.io/bluecords/pushd:${{ steps.tag.outputs.tag }}
          docker push ghcr.io/bluecords/pushd:latest
          echo "Pushed ghcr.io/bluecords/pushd:${{ steps.tag.outputs.tag }} (+ :latest)"
