name: Rust build, test, and generate specification

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # nextest runs each test on its own thread with Rust's default 2MiB stack.
  # On this runner, models::bots::model::tests::crud and
  # models::users::model::tests::create_user overflow that and abort with
  # SIGABRT -- unrelated to any app code, first time this workflow has ever
  # actually run tests in this org (no runner previously existed for it).
  # Raised to 8MiB, matching a typical main-thread default.
  RUST_MIN_STACK: 8388608

jobs:
  check:
    name: Rust project
    # Moved off the self-hosted runner (2026-07-13) to a hosted one -- free/
    # unmetered on this public repo, and matches every other workflow here.
    # See internal infra notes for the full rationale. Trade-off: no more
    # warm cross-run build cache, since hosted runners are ephemeral --
    # restored below via actions/cache instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      # Hosted runners ship with SDKs (Android/.NET/Haskell) this project
      # never uses -- free the space up front for the Rust build/docker pull.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc

      # Ephemeral runner = no cross-run persistence, so restore the Rust
      # build cache explicitly instead. Keyed on the root Cargo.lock (exact
      # path, not a **/ glob) so a dependency change invalidates it without
      # the hash step having to walk the whole tree -- a recursive glob here
      # fails outright once the docker-backed test containers below create
      # root-owned files under .data/, which the runner user can't read.
      # restore-keys falls back to the last cache on this branch otherwise.
      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@cd24790a7f5f6439ac32cc94f5523cb2de8bfa8c # use-mise-action-v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: mise build
      - run: mise docker:start
    
      - name: Reference Test
        env:
          TEST_DB: REFERENCE
        continue-on-error: ${{ github.ref_name == 'main' }}
        run: |
          mise test

      - name: MongoDB Test
        env:
          TEST_DB: MONGODB
          MONGODB: mongodb://localhost
        continue-on-error: ${{ github.ref_name == 'main' }}
        run: |
          mise test

